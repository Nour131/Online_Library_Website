<!DOCTYPE html>
<html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title> Borrow Book Page </title>
      </head>

      <body class = "user">
        <div>
        <nav class = 'navbar'>
            <div class = 'logo'>
                <h2>Online Library</h2>
            </div>
             <ul id = "nav-links" class="nav-links"></ul> 
        </nav>    
    </div>
        <h1 class="page-title"> Borrow Book </h1>
        <div class="form-container">
        <form id="borrowForm">
          <div class ="form-row">
            <div class="form-column">
              <label for ="bookid">Book Id:</label><br/>
              <input type="text" id="bookid" name="bookid" maxlength="20" required placeholder="Enter Book Id"> <br/>
            </div>
            <div class="form-column">
              <label for ="bookName">Book Name:</label><br/>
              <input type="text" id="bookName" name="bookName" maxlength="70"  placeholder="Enter Book name"> <br/>
            </div>
          <div class="form-row">
              <div class="form-column">  
              <label for ="author">Author:</label><br/>
              <input type="text" id="author" name="author"  maxlength="40"> <br/>
              </div>
              <div class="form-column">
              <label for ="category">Category:</label><br/>
              <input type="text" id="category" name="category"  maxlength="40"> <br/>
              </div>
              </div>
          <div class="form-row">
              <div class="form-column">
          <label for="status">Status:</label><br/>
          <select id="status" name="status" disabled>
            <option value="available" selected>Available</option>
          </select><br/>
          <p>Note: Only available books can be borrowed.</p>
          </div>
          </div>
          <br/>
          <input type="submit" value="Borrow"> <br/>
        </div>
        </form>
        <script src="borrow_book.js"></script>
        <script src = "Navbar.js"></script>
      </body>

</html>
